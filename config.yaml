# Variant Annotator Configuration

input:
  vcf_file: "data/sample.vcf"

clinvar:
  # Clinical significance levels to include in the report
  include_significance:
    - "Pathogenic"
    - "Likely pathogenic"
    - "Uncertain significance"
    - "Likely benign"
    - "Benign"

priority_levels:
  # Significance levels that get flagged as high priority in the report
  high_priority:
    - "pathogenic"
    - "likely pathogenic"
  medium_priority:
    - "uncertain significance"
  low_priority:
    - "likely benign"
    - "benign"
  pharmacogenomics:
    - "drug response"

report_file: "report.tsv"